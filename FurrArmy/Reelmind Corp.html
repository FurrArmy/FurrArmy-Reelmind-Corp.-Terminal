            font-family: monospace;
            overflow: hidden;
        }

        #terminal {
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.95;
            }

            100% {
                opacity: 1;
            }
        }

        .line {
            margin: 2px 0;
            white-space: pre-wrap;
        }

        .input-line {
            display: flex;
        }

        input {
            background: transparent;
            border: none;
            color: #00ff9f;
            outline: none;
            font-family: monospace;
            width: 100%;
        }

        .glow {
            text-shadow: 0 0 5px #00ff9f, 0 0 10px #00ff9f;
        }

        function printLine(text, speed = 20) {
            return new Promise(resolve => {
                let i = 0;
                const line = document.createElement("div");
                line.className = "line glow";
                terminal.appendChild(line);

                function type() {
                    if (i < text.length) {
                        line.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        function newInput() {
            const wrapper = document.createElement("div");
            wrapper.className = "input-line";

            const input = document.createElement("input");
            wrapper.appendChild(input);
            terminal.appendChild(wrapper);

            input.focus();

            input.addEventListener("keydown", async (e) => {
                if (e.key === "Enter") {
                    const value = input.value;
                    wrapper.remove();
                    await handleCommand(value);
                    newInput();
                }
            });
        }

        async function handleCommand(cmd) {
            const args = cmd.split(" ");

            if (args[0] === "login") {
                const username = args[1];
                const password = args[2];

                const acc = users[username];

                if (!acc || acc.password !== password) {
                    await printLine("ACCESS DENIED - INVALID CREDENTIALS");
                    return;
                }

                user = {
                    name: acc.name,
                    org: acc.org,
                    division: acc.division,
                    rank: acc.rank,
                    clearance: acc.clearance
                };

                await printLine(`Logged in as ${user.name}`);
                await printLine(`Organization: ${user.org}`);
                await printLine(`Division: ${user.division}`);
                await printLine(`Rank: ${user.rank}`);
                await printLine(`Clearance Level: ${user.clearance}`);
            }

            else if (args[0] === "list") {
                let found = false;

                for (let key in documents) {
                    if (key.startsWith("FA_") && user.org !== "FurrArmy") continue;
                    if (key.startsWith("RM_") && user.org !== "Reelmind") continue;

                    await printLine(`${key} | Clearance ${documents[key].clearance}`);
                    found = true;
                }

                if (!found) {
                    await printLine("No accessible documents for your organization");
                }
            }

            else if (args[0] === "open") {
                const docId = args[1];
                const doc = documents[docId];

                if (!doc) {
                    await printLine("Document not found");
                    return;
                }

                if (docId.startsWith("FA_") && user.org !== "FurrArmy") {
                    await printLine("ACCESS DENIED - FurrArmy Personnel Only");
                    return;
                }

                if (docId.startsWith("RM_") && user.org !== "Reelmind") {
                    await printLine("ACCESS DENIED - Reelmind Corp Personnel Only");
                    return;
                }

                if (user.clearance < doc.clearance) {
                    await printLine("ACCESS DENIED - INSUFFICIENT CLEARANCE");
                    return;
                }

                await printLine(`Title: ${doc.title}`);
                await printLine(`Clearance: ${doc.clearance}`);
                await printLine("---------------------");
                await printLine(doc.text);
            }

            else if (args[0] === "whoami") {
                await printLine(`User: ${user.name}`);
                await printLine(`Org: ${user.org}`);
                await printLine(`Division: ${user.division}`);
                await printLine(`Rank: ${user.rank}`);
                await printLine(`Clearance: ${user.clearance}`);
            }

            else if (args[0] === "help") {
                await printLine("Commands:");
                await printLine("login <username> <password>");
                await printLine("list");
                await printLine("open <DOC_ID>");
                await printLine("whoami");
            }

            else {
                await printLine("Unknown command");
            }
        }

        (async () => {
            await printLine("Initializing Secure Terminal...");
            await printLine("FurrArmy / Reelmind Corp  V.1.0.0");
            await printLine("Use: login <username> <password>");
            await printLine("Type 'help' for commands");
            newInput();
        })();
    </script>
